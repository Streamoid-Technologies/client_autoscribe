<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Autoscribe reporting</title>
</head>
<body>
<form enctype="multipart/form-data" method="post">
    <h2>Please enter dates for report (both inclusive)</h2>
    <table>
        <tr>
            <td>Start date</td>
            <td><input type="date" name="start_date" required></td>
        </tr>
        <tr>
            <td>End date</td>
            <td><input type="date" name="end_date" required></td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="Submit"></td>
        </tr>
    </table>
</form>
</body>
</html>
