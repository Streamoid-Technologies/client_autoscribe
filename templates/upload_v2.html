<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulk upload brand products</title>
</head>
<body>
<form method="post" enctype="multipart/form-data">
    <h3> Upload *.csv / *.xslx file from brand</h3>
    <table>
        <tr>
            <td>Brand</td>
            <td>
                <select id="brand" name="brand">
                    {% for brand in brands %}
                     <option value="{{ brand }}">{{ brand }}</option>
                    {% endfor %}
                </select>
            </td>
        </tr>
        <tr>
            <td>File</td>
            <td><input type="file" name="file"></td>
        </tr>
        <tr>
            <td></td>
            <td><input type="submit" value="Upload"></td>
        </tr>
    </table>
</form>
</body>
</html>
